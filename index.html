<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>نتيجة الطالب - بوابة الجامعة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background-color: #eef2f6;
            font-family: "Tahoma", Arial, sans-serif;
            direction: rtl;
        }

        /* Header */
        .header {
            background-color: #0b3c5d;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 55px;
            height: 55px;
            background: white;
            color: #0b3c5d;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 20px;
        }

        .header-text p {
            margin: 3px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            padding: 25px;
        }

        .student-info {
            border: 1px solid #dcdcdc;
            border-radius: 6px;
            padding: 15px;
            background: #fafafa;
            margin-bottom: 25px;
        }

        .student-info h2 {
            margin-top: 0;
            font-size: 18px;
            color: #0b3c5d;
        }

        .student-info p {
            margin: 6px 0;
            font-size: 15px;
        }

        /* Result Image */
        .result-box {
            text-align: center;
        }

        .result-box img {
            max-width: 100%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Footer */
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
            color: #555;
        }

        .footer span {
            color: #0b3c5d;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="logo">UNI</div>
        <div class="header-text">
            <h1>بوابة نتائج الطلاب</h1>
            <p>نظام المعلومات الإدارية</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <div class="student-info">
            <h2>بيانات الطالب</h2>
            <p><strong>الاسم:</strong> علي محمد علي عبد الحميد موسى</p>
            <p><strong>الكلية:</strong> كلية العلوم</p>
            <p><strong>العام الدراسي:</strong> الفصل الدراسي الأول</p>
        </div>

        <div class="result-box">
            <img src="result.png" alt="نتيجة الطالب">
        </div>

        <div class="footer">
            جميع الحقوق محفوظة © <span>جامعة رسمية</span> – 2026  
            <br>
            Developed by thenameskhalid
        </div>

    </div>

</body>
</html>
